<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
            margin-top: 80px;
        }

        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
        }

        .status {
            margin: 10px;
            font-weight: bold;
        }

        .on {
            color: #22c55e; /* green */
        }

        .off {
            color: #ef4444; /* red */
        }

        button {
            margin: 10px;
            padding: 10px 15px;
            background: #3b82f6;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>Welcome User {{ user_id }}</h2>

        <h3>Security Controls</h3>

        <p class="status">
            RBAC:
            {% if rbac %}
                <span class="on">ON 🟢</span>
            {% else %}
                <span class="off">OFF 🔴</span>
            {% endif %}
        </p>

        <p class="status">
            Rate Limit:
            {% if rate %}
                <span class="on">ON 🟢</span>
            {% else %}
                <span class="off">OFF 🔴</span>
            {% endif %}
        </p>

        <p class="status">
            Sanitization:
            {% if sanitize %}
                <span class="on">ON 🟢</span>
            {% else %}
                <span class="off">OFF 🔴</span>
            {% endif %}
        </p>

        <h4>Attack Simulation</h4>

<a href="/profile/2" target="_blank">
    <button <button onclick="window.open('/profile/2', '_blank')" style="background:#ef4444;">
    Try IDOR Attack
</button>
</a>

        <form method="POST" action="/toggle-ui">
            <button name="control" value="RBAC_ENABLED">Toggle RBAC</button>
            <button name="control" value="RATE_LIMIT_ENABLED">Toggle Rate Limit</button>
            <button name="control" value="INPUT_SANITIZATION_ENABLED">Toggle Sanitization</button>
        </form>
    </div>
</body>
</html>
