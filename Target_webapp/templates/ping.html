<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Ping Tool | SCEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0d13; color: #cbd5e1; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .card-log { background: linear-gradient(135deg, #111827 0%, #0f1219 100%); border: 1px solid rgba(56, 189, 248, 0.15); box-shadow: 0 0 30px rgba(56, 189, 248, 0.03); }
        body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px); background-size: 30px 30px; pointer-events: none; z-index: -1; }
    </style>
</head>
<body class="selection:bg-amber-500/30 min-h-screen flex items-center justify-center p-4">

    <div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">
        <div class="absolute top-[40%] left-[30%] w-[20%] h-[20%] bg-emerald-600/[0.02] blur-[100px] rounded-full"></div>
    </div>

    <div class="card-log rounded-xl p-8 w-full max-w-2xl">
        
        <div class="flex items-center justify-between mb-6 border-b border-white/5 pb-4">
            <div class="flex items-center gap-3">
                <span class="text-sky-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 9l3 3-3 3m5 0h3M4 17h16a1 1 0 001-1V8a1 1 0 00-1-1H4a1 1 0 00-1 1v8a1 1 0 001 1z"/></svg>
                </span>
                <h2 class="text-lg font-bold text-white tracking-tight">Diagnostic Ping Tool</h2>
            </div>
        </div>

        <form method="POST" class="flex gap-4 mb-6">
            <input type="text" name="ip" placeholder="Enter IP (e.g. 8.8.8.8)" class="flex-1 bg-[#1a1f28] border border-white/10 rounded-lg px-4 py-2.5 text-sm font-mono text-cyan-400 focus:outline-none focus:border-cyan-500/50 transition-colors">
            
            <button type="submit" class="px-6 py-2.5 rounded-lg bg-sky-500/10 hover:bg-sky-500/20 border border-sky-500/50 text-sky-400 hover:text-sky-300 font-bold text-sm tracking-wide transition-all shadow-[0_0_15px_rgba(14,165,233,0.1)] hover:shadow-[0_0_20px_rgba(14,165,233,0.2)]">
                PING
            </button>
        </form>

        {% if result %}
        <div class="bg-[#0b0e14] border border-white/5 rounded-lg p-4 max-h-[400px] overflow-auto">
            <pre class="font-mono text-[11px] text-slate-300 whitespace-pre-wrap">{{ result }}</pre>
        </div>
        {% else %}
        <div class="bg-[#0b0e14] border border-white/5 rounded-lg p-8 text-center">
            <p class="text-xs font-mono text-slate-500">Waiting for target IP...</p>
        </div>
        {% endif %}

    </div>

</body>
</html>
