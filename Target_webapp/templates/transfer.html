<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Transfer | SCEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0d13; color: #cbd5e1; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .card-baseline { background: linear-gradient(135deg, #111827 0%, #0f1219 100%); border: 1px solid rgba(16, 185, 129, 0.3); box-shadow: 0 0 20px rgba(16, 185, 129, 0.05), inset 0 1px 0 rgba(16, 185, 129, 0.1); }
        .card-chaos { background: linear-gradient(135deg, #111827 0%, #0f1219 100%); border: 1px solid rgba(239, 68, 68, 0.3); box-shadow: 0 0 20px rgba(239, 68, 68, 0.05), inset 0 1px 0 rgba(239, 68, 68, 0.1); }
        body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px); background-size: 30px 30px; pointer-events: none; z-index: -1; }
    </style>
</head>
<body class="selection:bg-amber-500/30 min-h-screen flex items-center justify-center p-4">

    <div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">
        <div class="absolute top-[-15%] right-[-5%] w-[35%] h-[35%] bg-blue-600/[0.04] blur-[150px] rounded-full"></div>
        <div class="absolute bottom-[-15%] left-[-5%] w-[35%] h-[35%] bg-emerald-600/[0.03] blur-[150px] rounded-full"></div>
    </div>

    <div class="{% if csrf %}card-baseline{% else %}card-chaos{% endif %} rounded-xl p-8 w-full max-w-md">
        
        <div class="flex items-center gap-3 mb-6 justify-center">
            <span class="text-2xl">💸</span>
            <h2 class="text-xl font-bold text-white tracking-tight">Transfer Money</h2>
        </div>

        <div class="mb-6 flex justify-center">
            {% if csrf %}
                <span class="inline-flex items-center gap-1.5 px-3 py-1 bg-emerald-500/10 border border-emerald-500/25 rounded text-[11px] font-bold text-emerald-400 uppercase tracking-wider">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                    CSRF Protection Enabled
                </span>
            {% else %}
                <span class="inline-flex items-center gap-1.5 px-3 py-1 bg-red-500/10 border border-red-500/25 rounded text-[11px] font-bold text-red-400 uppercase tracking-wider">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                    CSRF Protection Disabled
                </span>
            {% endif %}
        </div>

        <form method="POST" action="/transfer" class="space-y-5">
            <div>
                <input type="text" name="amount" placeholder="Enter amount" class="w-full bg-[#1a1f28] border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500/50 transition-colors">
            </div>

            {% if csrf %}
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            {% endif %}

            <button type="submit" class="w-full flex justify-center items-center gap-2 px-6 py-3 rounded-lg bg-sky-500/10 hover:bg-sky-500/20 border border-sky-500/50 text-sky-400 hover:text-sky-300 font-bold text-sm tracking-wide transition-all shadow-[0_0_15px_rgba(14,165,233,0.1)] hover:shadow-[0_0_20px_rgba(14,165,233,0.2)]">
                INITIATE TRANSFER
            </button>
        </form>

    </div>

</body>
</html>
